name: fetch-images
on:
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: fetch-images
  cancel-in-progress: false
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip -q install requests pillow
      - name: configure git
        run: |
          git config user.name "icam-bot"
          git config user.email "bot@adelaar.store"
      - name: fetch images
        env:
          ZENROWS_KEY: ${{ secrets.ZENROWS_KEY }}
          WORKERS: "8"
          TIME_BUDGET_H: "5.2"
        run: python fetch_images.py
      - name: self-redispatch if incomplete
        if: always()
        env:
          GH_PAT: ${{ secrets.ICAM_PAT }}
        run: |
          REMAIN=$(cat remaining.txt 2>/dev/null || echo 0)
          echo "remaining: $REMAIN"
          if [ "$REMAIN" -gt 0 ]; then
            curl -s -X POST -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/fetch.yml/dispatches \
              -d '{"ref":"main"}'
            echo "redispatched"
          fi
